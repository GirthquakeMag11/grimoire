[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
filterwarnings = ["ignore::DeprecationWarning:discord"]
asyncio_default_test_loop_scope = "module"
asyncio_default_fixture_loop_scope = "module"
addopts = "-v --capture=tee-sys --asyncio-debug --cov=src --cov-report=term-missing"

[tool.coverage.report]
fail_under = 80

[tool.coverage.run]
branch = true

[tool.mypy]
strict = true
files = ["src", "tests"]
show_error_codes = true
show_column_numbers = true
pretty = true
warn_unused_ignores = true

[tool.ruff]
line-length = 120
indent-width = 4
exclude = ["draft"]
